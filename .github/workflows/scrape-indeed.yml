name: Scrape Indeed

on:
  # 【schedule 一時停止】self-hosted runner は Cloud 版が本番稼働するまで手動のみ
  # 再開する時は以下 schedule ブロックのコメントを外す:
  # schedule:
  #   - cron: '*/30 * * * *'

  # 手動トリガー
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード'
        required: true
        default: 'tick'
        type: choice
        options:
          - tick
          - status
          - export
      max_pages:
        description: 'tick 内で 1 検索クエリあたりの取得ページ数'
        required: false
        default: '1'
        type: string
      request_delay_seconds:
        description: 'リクエスト間隔秒（Indeed は 60 秒以上推奨）'
        required: false
        default: '60'
        type: string

# 同時実行を 1 個に制限（重複 tick 防止）
concurrency:
  group: scrape-indeed
  cancel-in-progress: false

jobs:
  scrape:
    # 家 Mac (家庭用 IP) 限定。GitHub Cloud IP は Indeed に即 BAN されるため。
    runs-on: [self-hosted, macOS, indeed-capable]
    timeout-minutes: 60

    env:
      # SQLite DB は self-hosted runner 上に永続化 (checkout workspace 外)
      STATE_DB: /Users/yoshu/job-scraper/data/state.db
      REQUEST_DELAY_SECONDS: ${{ github.event.inputs.request_delay_seconds || '60' }}
      HEADLESS: 'true'
      LOG_LEVEL: 'INFO'
      BAN_PAUSE_SECONDS: '3600'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve local venv
        id: venv
        run: |
          LOCAL_VENV="/Users/yoshu/job-scraper/.venv"
          if [ ! -d "$LOCAL_VENV" ]; then
            echo "❌ ローカル venv が見つかりません: $LOCAL_VENV" >&2
            exit 1
          fi
          echo "python=${LOCAL_VENV}/bin/python" >> "$GITHUB_OUTPUT"
          ${LOCAL_VENV}/bin/python --version

      - name: Resolve mode
        id: mode
        run: |
          MODE="${{ github.event.inputs.mode || 'tick' }}"
          MAX_PAGES="${{ github.event.inputs.max_pages || '1' }}"
          TIMESTAMP=$(TZ=Asia/Tokyo date +%Y%m%d-%H%M%S)
          echo "mode=${MODE}" >> "$GITHUB_OUTPUT"
          echo "max_pages=${MAX_PAGES}" >> "$GITHUB_OUTPUT"
          echo "timestamp=${TIMESTAMP}" >> "$GITHUB_OUTPUT"

      - name: Run tick
        if: steps.mode.outputs.mode == 'tick'
        run: |
          ${{ steps.venv.outputs.python }} -m src.main tick \
            --site indeed \
            --max-pages ${{ steps.mode.outputs.max_pages }}

      - name: Show status
        if: always()
        run: |
          ${{ steps.venv.outputs.python }} -m src.main status --site indeed | tee status.txt
          {
            echo "## Indeed 進捗"
            echo '```'
            cat status.txt
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Export CSV (mode=export)
        if: steps.mode.outputs.mode == 'export'
        run: |
          FILE="output/indeed-phone-${{ steps.mode.outputs.timestamp }}.csv"
          ${{ steps.venv.outputs.python }} -m src.main export --site indeed --output "$FILE"
          echo "csv=$FILE" >> $GITHUB_ENV

      - name: Upload exported CSV
        if: steps.mode.outputs.mode == 'export' && env.csv != ''
        uses: actions/upload-artifact@v4
        with:
          name: indeed-phone-${{ steps.mode.outputs.timestamp }}
          path: ${{ env.csv }}
          retention-days: 30
