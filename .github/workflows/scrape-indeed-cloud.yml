name: Scrape Indeed (Cloud via Bright Data)

on:
  # 30 分ごとに自動 tick (validate で電話率 95% 実測を受けて本番化)
  schedule:
    - cron: '*/30 * * * *'

  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード'
        required: true
        default: 'tick'
        type: choice
        options:
          - tick
          - status
          - export
          - validate
      max_pages:
        description: 'tick 内の 1 検索クエリあたり取得ページ数'
        required: false
        default: '5'
        type: string
      request_delay_seconds:
        description: 'リクエスト間隔秒 (proxy 経由なら 3-5 秒で十分)'
        required: false
        default: '3'
        type: string
      samples:
        description: 'validate モード時のサンプル件数'
        required: false
        default: '100'
        type: string

# 同時実行 1 個
concurrency:
  group: scrape-indeed-cloud
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    env:
      # Bright Data Web Unlocker proxy URL (Secret から注入)
      BRIGHTDATA_PROXY_URL: ${{ secrets.BRIGHTDATA_PROXY_URL }}
      # SQLite DB は checkout workspace 内 (GitHub Cloud は都度 fresh なので Artifact で永続化)
      STATE_DB: data/state.db
      REQUEST_DELAY_SECONDS: ${{ github.event.inputs.request_delay_seconds || '3' }}
      HEADLESS: 'true'
      LOG_LEVEL: 'INFO'
      BAN_PAUSE_SECONDS: '1800'

    steps:
      - name: Fail fast if secret missing
        run: |
          if [ -z "${{ env.BRIGHTDATA_PROXY_URL }}" ]; then
            echo "❌ BRIGHTDATA_PROXY_URL secret が未設定です。" >&2
            echo "Settings → Secrets → Actions で登録してください。" >&2
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      # SQLite DB を過去 run の Artifact から復元
      # actions/download-artifact@v4 は同一 run 内のみ対象なので gh CLI を使う
      - name: Download previous state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data
          echo "指定 artifact 名 = indeed-state-db"
          # 有効期限内で最新の同名 artifact を探す
          ARTIFACT_JSON=$(gh api "/repos/${{ github.repository }}/actions/artifacts?name=indeed-state-db&per_page=100" \
            --jq '.artifacts | map(select(.expired == false)) | sort_by(.created_at) | reverse | .[0]')
          if [ -z "$ARTIFACT_JSON" ] || [ "$ARTIFACT_JSON" = "null" ]; then
            echo "過去 artifact なし: 空の state.db で開始"
            exit 0
          fi
          PRIOR_RUN_ID=$(echo "$ARTIFACT_JSON" | jq -r '.workflow_run.id')
          echo "復元元 run_id=$PRIOR_RUN_ID"
          gh run download "$PRIOR_RUN_ID" \
            --repo "${{ github.repository }}" \
            -n indeed-state-db \
            -D data \
            || echo "download 失敗: 空で開始"
          ls -la data/

      - name: Resolve mode
        id: mode
        run: |
          MODE="${{ github.event.inputs.mode || 'tick' }}"
          MAX_PAGES="${{ github.event.inputs.max_pages || '5' }}"
          SAMPLES="${{ github.event.inputs.samples || '100' }}"
          TIMESTAMP=$(TZ=Asia/Tokyo date +%Y%m%d-%H%M%S)
          echo "mode=${MODE}" >> "$GITHUB_OUTPUT"
          echo "max_pages=${MAX_PAGES}" >> "$GITHUB_OUTPUT"
          echo "samples=${SAMPLES}" >> "$GITHUB_OUTPUT"
          echo "timestamp=${TIMESTAMP}" >> "$GITHUB_OUTPUT"

      - name: Run tick
        if: steps.mode.outputs.mode == 'tick'
        run: |
          python -m src.main tick \
            --site indeed \
            --max-pages ${{ steps.mode.outputs.max_pages }}

      - name: Run validate
        if: steps.mode.outputs.mode == 'validate'
        run: |
          python -m src.main validate \
            --samples ${{ steps.mode.outputs.samples }} \
            --max-pages-per-tick ${{ steps.mode.outputs.max_pages }}

      - name: Show status
        if: always()
        run: |
          python -m src.main status --site indeed | tee status.txt
          {
            echo "## Indeed 進捗"
            echo '```'
            cat status.txt
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Export CSV (mode=export)
        if: steps.mode.outputs.mode == 'export'
        run: |
          FILE="output/indeed-phone-${{ steps.mode.outputs.timestamp }}.csv"
          python -m src.main export --site indeed --output "$FILE"
          echo "csv=$FILE" >> $GITHUB_ENV

      - name: Upload exported CSV
        if: steps.mode.outputs.mode == 'export' && env.csv != ''
        uses: actions/upload-artifact@v4
        with:
          name: indeed-phone-${{ steps.mode.outputs.timestamp }}
          path: ${{ env.csv }}
          retention-days: 30

      # 常に SQLite DB を上書き Artifact として保存 (次回 tick で復元)
      - name: Upload state DB
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: indeed-state-db
          path: data/state.db
          retention-days: 30
          overwrite: true
